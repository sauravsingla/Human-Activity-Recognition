name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quality dependencies
        run: python -m pip install -e ".[test,dev]"
      - name: Lint source and tests
        run: ruff check src tests

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install unit-test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run data tests with coverage
        run: pytest tests/test_data.py --cov=har.data --cov-report=term-missing --cov-fail-under=85

  tensorflow-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install training and test dependencies
        run: python -m pip install -e ".[train,test]"
      - name: Run complete test suite
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
          CUDA_VISIBLE_DEVICES: "-1"
        run: pytest
